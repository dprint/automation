name: ci

on:
  push:
    branches: [main]
    tags:
      - '*'
  pull_request:
    branches: [main]

jobs:
  jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: canary
      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: Test
        run: deno test -P
      - name: Publish to JSR on tag
        run: deno run -A jsr:@david/publish-on-tag@0.2.0
